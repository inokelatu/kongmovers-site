<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KongMovers – Moving Specialist Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0d2020 0%, #0d2b2b 60%, #0a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 20px;
    }

    .chat-wrap {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(185,151,58,0.25), 0 30px 80px rgba(0,0,0,0.7);
    }

    /* HEADER */
    .chat-header {
      background: linear-gradient(135deg, #0d2b2b 0%, #1a3a38 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid #b8973a;
    }

    .logo-img {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #b8973a;
      box-shadow: 0 4px 14px rgba(185,151,58,0.3);
      flex-shrink: 0;
    }

    .header-text { flex: 1; }

    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: #f5f0e8;
      letter-spacing: 2px;
      line-height: 1;
    }

    .header-text h1 span { color: #b8973a; }

    .header-text .tagline {
      font-size: 11px;
      color: #7aaa98;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .status-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .online-pill {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.35);
      border-radius: 20px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #4ade80;
      font-weight: 600;
    }

    .online-dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .same-day-badge {
      background: linear-gradient(90deg, #b8973a, #d4b05a);
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 10px;
      color: #0d2b2b;
      font-weight: 700;
    }

    /* MESSAGES */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px 10px;
      background: #0a1e1e;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: #1a3a38 transparent;
    }

    .bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 9px;
    }

    .bubble-wrap.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1.5px solid #b8973a;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      color: #e8e0d0;
      background: #132828;
      border: 1px solid #1e3e3a;
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: linear-gradient(135deg, #b8973a, #c9a84c);
      color: #0d2020;
      font-weight: 500;
      border: none;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #132828;
      border: 1px solid #1e3e3a;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-items: center;
    }

    .dot {
      width: 7px; height: 7px;
      background: #b8973a;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-7px); opacity: 1; }
    }

    /* SUGGESTIONS */
    .suggestions {
      padding: 10px 18px 6px;
      background: #0a1e1e;
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .chip {
      background: #132828;
      border: 1px solid #2a4a44;
      color: #b8973a;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .chip:hover {
      background: #b8973a;
      color: #0d2020;
      border-color: #b8973a;
      font-weight: 600;
      transform: translateY(-1px);
    }

    /* CONTACT BAR */
    .contact-bar {
      padding: 10px 18px;
      background: #0d2020;
      display: flex;
      gap: 10px;
      border-top: 1px solid #1a3a38;
    }

    .contact-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.18s;
      cursor: pointer;
    }

    .phone-btn {
      background: #132828;
      border: 1px solid #2a4a44;
      color: #e8e0d0;
    }

    .phone-btn:hover {
      background: #1e3e3a;
      border-color: #b8973a;
      color: #b8973a;
      transform: translateY(-1px);
    }

    .book-btn {
      background: linear-gradient(135deg, #b8973a, #d4b05a);
      border: none;
      color: #0d2020;
      box-shadow: 0 4px 12px rgba(185,151,58,0.3);
    }

    .book-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(185,151,58,0.5);
    }

    /* INPUT */
    .input-area {
      padding: 14px 18px;
      background: #0d2020;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid #1a3a38;
    }

    .input-area textarea {
      flex: 1;
      background: #132828;
      border: 1px solid #2a4a44;
      border-radius: 14px;
      padding: 11px 16px;
      color: #e8e0d0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      max-height: 100px;
      line-height: 1.5;
    }

    .input-area textarea::placeholder { color: #3a6060; }
    .input-area textarea:focus { border-color: #b8973a; }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #b8973a, #d4b05a);
      border: none;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(185,151,58,0.35);
    }

    .send-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #0d2020; }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="chat-header">
      <img class="logo-img" src="logo.png" alt="KongMovers Logo" onerror="this.style.display='none'"/>
      <div class="header-text">
        <h1>KONG <span>MOVERS</span></h1>
        <div class="tagline">Moving Specialist Support</div>
      </div>
      <div class="status-col">
        <div class="online-pill">
          <div class="online-dot"></div>
          Online
        </div>
        <div class="same-day-badge">⚡ SAME-DAY AVAILABLE</div>
      </div>
    </div>

    <div class="messages-area" id="messages"></div>

    <div class="suggestions" id="suggestions">
      <button class="chip" onclick="sendMessage('I need a same-day move 🚨')">I need a same-day move 🚨</button>
      <button class="chip" onclick="sendMessage('Get me a quote')">Get me a quote</button>
      <button class="chip" onclick="sendMessage('What services do you offer?')">What services do you offer?</button>
      <button class="chip" onclick="sendMessage('I need to move a piano')">I need to move a piano</button>
    </div>

    <div class="contact-bar">
      <a href="tel:3852665700" class="contact-btn phone-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        (385) 266-5700
      </a>
      <a href="https://forms.gle/7vLTqcXqpS4KjA8M7" target="_blank" class="contact-btn book-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        Book Now
      </a>
    </div>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Ask Marcus about your move..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://kongmovers-chatbot-backend-production.up.railway.app/chat";
    const LOGO_URL = "https://i.imgur.com/placeholder.png"; // will use logo.png if uploaded

    let messages = [
      {
        role: "assistant",
        content: "Hey! I'm Marcus, your moving specialist at KongMovers 💪 Whether you need us there today or you're planning ahead, we handle all moves — same-day, local, and long-distance. What can I help you with?"
      }
    ];

    let isLoading = false;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const suggestionsEl = document.getElementById("suggestions");

    // Render initial message
    renderMessages();

    inputEl.addEventListener("input", () => {
      sendBtn.disabled = !inputEl.value.trim() || isLoading;
      inputEl.style.height = "auto";
      inputEl.style.height = inputEl.scrollHeight + "px";
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function renderMessages() {
      messagesEl.innerHTML = "";
      messages.forEach(msg => {
        const wrap = document.createElement("div");
        wrap.className = `bubble-wrap ${msg.role}`;

        if (msg.role === "assistant") {
          const avatar = document.createElement("div");
          avatar.className = "avatar";
          avatar.innerHTML = `<img src="logo.png" alt="KongMovers" onerror="this.parentElement.innerHTML='🦍'"/>`;
          wrap.appendChild(avatar);
        }

        const bubble = document.createElement("div");
        bubble.className = `bubble ${msg.role}`;
        bubble.textContent = msg.content;
        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addTypingIndicator() {
      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap assistant";
      wrap.id = "typing";
      wrap.innerHTML = `
        <div class="avatar"><img src="logo.png" alt="KongMovers" onerror="this.parentElement.innerHTML='🦍'"/></div>
        <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      `;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTypingIndicator() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    async function sendMessage(text) {
      const userText = text || inputEl.value.trim();
      if (!userText || isLoading) return;

      // Hide suggestions after first message
      suggestionsEl.style.display = "none";

      messages.push({ role: "user", content: userText });
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      isLoading = true;

      renderMessages();
      addTypingIndicator();

      try {
        const response = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: messages.map(m => ({ role: m.role, content: m.content })) }),
        });

        removeTypingIndicator();

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let assistantText = "";

        messages.push({ role: "assistant", content: "" });

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split("\n").filter(l => l.startsWith("data: "));
          for (const line of lines) {
            const data = line.slice(6);
            if (data === "[DONE]") continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === "content_block_delta" && parsed.delta?.text) {
                assistantText += parsed.delta.text;
                messages[messages.length - 1].content = assistantText;
                renderMessages();
              }
            } catch {}
          }
        }
      } catch (err) {
        removeTypingIndicator();
        messages.push({ role: "assistant", content: "Sorry, something went wrong. Please try again or call us at (385) 266-5700!" });
        renderMessages();
      } finally {
        isLoading = false;
        sendBtn.disabled = !inputEl.value.trim();
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
